version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./building_materials_store
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - appnet
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    command: ["./entrypoint.sh", "gunicorn", "--bind", "0.0.0.0:8000", "--workers", "4", "building_materials_store.wsgi:application"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - appnet
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ssl_certs:/etc/nginx/ssl
      - static_data:/app/staticfiles
      - media_data:/app/media

volumes:
  postgres_data:
  media_data:
  static_data:
  ssl_certs:

networks:
  appnet: