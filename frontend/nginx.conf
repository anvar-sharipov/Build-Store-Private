server {
    listen 80;
    server_name 192.168.25.74 localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 192.168.25.74 localhost;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Проксирование Django Admin
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # # Проксирование статических файлов Django
    # location /static/ {
    #     proxy_pass http://backend:8000/static/;
    #     proxy_set_header Host $host;
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    # }

    # # Проксирование media файлов
    # location /media/ {
    #     proxy_pass http://backend:8000/media/;
    #     proxy_set_header Host $host;
    # }

    # Проксирование статических файлов Django через Nginx напрямую
    location /static/ {
        alias /app/staticfiles/;  # <- путь внутри контейнера backend, где collectstatic положил файлы
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Проксирование media файлов
    location /media/ {
        alias /app/media/;  # <- путь внутри контейнера backend
        expires 30d;
        add_header Cache-Control "public";
    }

    # Проксирование API запросов к бэкенду
    location /api/ {
        proxy_pass http://backend:8000/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Обработка React Router (SPA) - ПОСЛЕДНЕЕ
    location / {
        try_files $uri $uri/ /index.html;
    }
}